# sops rules — which age key(s) each secret is encrypted to. The `sops` CLI reads this when you
# create, edit, or re-key a secret. (The Nix build does NOT read this file; it only reads the
# already-encrypted `.sops` files.)
#
# `path_regex` is matched against the file's path under this folder. The FIRST matching rule wins,
# so keep the most specific rules on top. The `age:` list holds the PUBLIC keys allowed to decrypt —
# copy them from a machine's `/etc/nix/age/<user>` (public part printed by `age-keygen -y`).
#
# To add a machine: bootstrap its key, then add the printed `age1…` to the relevant rule(s) below.
creation_rules:
    # This Mac's own secrets (identity folder) — encrypt to glorpbook only.
    - path_regex: cogs@glorpbook/.*
      age: age10s8vwdz6da00g7l2vgepz5wmxh47aznwudj5vyja6xnd7qtlc45qws5sm5

    # "cogs on all my machines" secrets — encrypt to every cogs machine key (just glorpbook today).
    - path_regex: cogs/.*
      age: age10s8vwdz6da00g7l2vgepz5wmxh47aznwudj5vyja6xnd7qtlc45qws5sm5
